# Scala Steward configuration for ddd-sample-scala
#
# To enroll this repository, open a PR against the central scala-steward
# `repos.md` file (e.g. https://github.com/VirtusLab/scala-steward-repos
# or your team's fork) adding the line:
#
#     - oluies/ddd-sample-scala
#
# Scala Steward picks up THIS file from the repo root automatically.
# Reference: https://github.com/scala-steward-org/scala-steward/blob/main/docs/repo-specific-configuration.md

updates.allow = [
  { groupId = "org.springframework" },
  { groupId = "org.hibernate" },
  { groupId = "org.apache.cxf" },
  { groupId = "org.scalatest" },
  { groupId = "org.scalacheck" },
  { groupId = "org.scalatestplus" },
  { groupId = "org.mockito" },
  { groupId = "ch.qos.logback" },
  { groupId = "org.slf4j" },
  { groupId = "commons-io" },
  { groupId = "org.apache.commons" },
  { groupId = "org.apache.activemq" }
]

# Hold the Scala compiler/library — manual migration owns the 2 → 3 jump.
# Once on Scala 3, replace this with a pin to the chosen 3.x line and let
# Steward bump within it.
updates.pin = [
  { groupId = "org.scala-lang", artifactId = "scala-library", version = "2." },
  { groupId = "org.scala-lang", artifactId = "scala3-library", version = "3." }
]

# Skip the deprecated easymock — we'll drop it during the test-framework
# migration to mockito-scala / scalatestplus.
updates.ignore = [
  { groupId = "org.easymock" },
  { groupId = "javassist" }
]

updates.limit = 10

# Group security/non-breaking patches together; major bumps separately.
updates.grouping = [
  { name = "patches", title = "Patch updates", filter = [{ version = "patch" }] }
]

# Don't auto-bump in PR descriptions; just open one PR per update group.
commits.message = "chore(deps): ${artifactName} ${currentVersion} -> ${nextVersion}"

pullRequests.frequency = "@weekly"
