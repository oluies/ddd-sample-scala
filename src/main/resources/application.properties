# Spring Boot configuration for the ddd-sample-scala rewrite.
# Filled in incrementally as each phase lands.

spring.application.name=ddd-sample
server.port=8080

# Actuator: expose health + info while we don't have real metrics yet.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# --- Auto-config exclusions ---
# These pull in beans that need infrastructure we haven't built yet.
# Re-enable per phase:
#   - DataSource / JPA: phase 9 (infrastructure.persistence)
#   - ActiveMQ:         phase 15 (infrastructure.messaging.jms)
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.jms.JmsAutoConfiguration,\
  org.springframework.boot.autoconfigure.jms.activemq.ActiveMQAutoConfiguration
