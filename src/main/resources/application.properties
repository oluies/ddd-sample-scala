# Spring Boot configuration for the ddd-sample-scala rewrite.
# Filled in incrementally as each phase lands.

spring.application.name=ddd-sample
server.port=8080

# Actuator: expose health + info while we don't have real metrics yet.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# In-process ActiveMQ broker. Used by InfrastructureMessagingJmsConfig's
# ActiveMQConnectionFactory. The vm:// transport spins up an embedded broker
# inside the JVM — no external broker needed for the teaching example.
brokerUrl=vm://localhost?broker.persistent=false&broker.useJmx=false

# Use JDK interface-based proxies for @Transactional / @Async / AOP. Our
# Spring-bean classes are `final class` (Scala default for idiomatic OO),
# which the default CGLIB proxying can't subclass. All service impls already
# implement a trait, so interface-based proxies are sufficient.
spring.aop.proxy-target-class=false

# --- Auto-config exclusions ---
# These pull in beans that need infrastructure we haven't built yet.
# Re-enable when phase 9b (JPA adapters) lands.
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.jms.JmsAutoConfiguration,\
  org.springframework.boot.autoconfigure.jms.activemq.ActiveMQAutoConfiguration
