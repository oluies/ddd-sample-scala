version: 2
updates:
  # JVM dependencies (build.mill) are managed by Scala Steward — Dependabot
  # does not have a `mill` package-ecosystem as of writing. See
  # `.scala-steward.conf` for the Steward configuration. Enroll the repo by
  # adding it to your scala-steward-repos.md.

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
