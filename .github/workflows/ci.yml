name: CI

on:
  push:
    branches: [master, "task*/**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: sbt test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Java 17 is the baseline for Spring 5 / Hibernate 5 / CXF 3 on
        # Scala 3. Add 21 once dependencies are confirmed-clean on it.
        java: ["17"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('**/*.sbt', 'project/build.properties', 'project/plugins.sbt') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Show toolchain versions
        run: |
          java -version
          sbt --version

      - name: Compile
        run: sbt -v "compile; Test/compile"

      - name: Test
        run: sbt -v test

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java-${{ matrix.java }}
          path: |
            target/test-reports/**
            target/scala-*/test-reports/**
          if-no-files-found: ignore
          retention-days: 14
