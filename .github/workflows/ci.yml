name: CI

on:
  push:
    branches: [master, "task*/**", "rewrite/**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: mill test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Java 21 is the baseline for Spring Boot 3.3 / Jakarta EE / Hibernate 6.
        java: ["21"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Install Mill
        # Mill 1.x ships as the `mill-dist` artifact on Maven Central
        # (same path Homebrew uses). The coursier-setup action's bundled
        # `mill` apps definition still maps to the legacy 0.11.x
        # `com.lihaoyi::mill-dev` which has no 1.x build, so we bypass
        # coursier-setup and curl the launcher directly. Pin to the
        # version recorded in `.mill-version`.
        run: |
          set -euo pipefail
          MILL_VERSION="$(cat .mill-version)"
          mkdir -p "$HOME/.local/bin"
          curl -fL \
            "https://repo1.maven.org/maven2/com/lihaoyi/mill-dist/${MILL_VERSION}/mill-dist-${MILL_VERSION}.exe" \
            -o "$HOME/.local/bin/mill"
          chmod +x "$HOME/.local/bin/mill"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache Mill + Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
          key: ${{ runner.os }}-mill-${{ hashFiles('**/build.mill', '.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Show toolchain versions
        run: |
          java -version
          mill --version

      - name: Compile
        run: mill ddd.compile + ddd.test.compile

      - name: Test
        if: hashFiles('src/test/scala/**/*.scala') != ''
        run: mill ddd.test

      - name: Check formatting
        run: mill __.checkFormat

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java-${{ matrix.java }}
          path: |
            out/ddd/test/test-report.xml
            out/ddd/test/test-classes/**/*-output.txt
          if-no-files-found: ignore
          retention-days: 14
