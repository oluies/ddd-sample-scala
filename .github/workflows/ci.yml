name: CI

on:
  push:
    branches: [master, "task*/**", "rewrite/**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: mill test (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Java 21 is the baseline for Spring Boot 3.3 / Jakarta EE / Hibernate 6.
        java: ["21"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Set up Coursier (installs Mill at the version in .mill-version)
        uses: coursier/setup-action@v1
        with:
          apps: mill

      - name: Cache Mill + Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
          key: ${{ runner.os }}-mill-${{ hashFiles('**/build.mill', '.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Show toolchain versions
        run: |
          java -version
          mill --version

      - name: Compile
        run: mill ddd.compile + ddd.test.compile

      - name: Test
        if: hashFiles('src/test/scala/**/*.scala') != ''
        run: mill ddd.test

      - name: Check formatting
        run: mill __.checkFormat

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-java-${{ matrix.java }}
          path: |
            out/ddd/test/test-report.xml
            out/ddd/test/test-classes/**/*-output.txt
          if-no-files-found: ignore
          retention-days: 14
